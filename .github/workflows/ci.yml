name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Lint & Test & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --coverage
      - run: npm run build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info

  backend:
    name: Backend (Lint & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest --cov=app --cov-report=xml -v

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Install backend dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Start backend
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend

      - name: Start frontend
        run: npm run dev -- --host 0.0.0.0 --port 5173 &
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000

      - name: Wait for services to be ready
        run: |
          npx wait-on http://localhost:5173 --timeout 15000
          npx wait-on http://localhost:8000/docs --timeout 15000
        working-directory: frontend

      - name: Run E2E tests
        run: npx playwright test --reporter=html
        working-directory: frontend
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Fix coverage paths for SonarCloud
        run: |
          echo "--- Frontend lcov.info (before fix) ---"
          head -5 frontend/coverage/lcov.info
          sed -i 's|SF:src/|SF:frontend/src/|g' frontend/coverage/lcov.info
          echo "--- Frontend lcov.info (after fix) ---"
          head -5 frontend/coverage/lcov.info

          echo "--- Backend coverage.xml (before fix) ---"
          cat backend/coverage.xml
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('backend/coverage.xml')
          root = tree.getroot()
          for source in root.iter('source'):
              source.text = 'backend/app'
          for cls in root.iter('class'):
              fn = cls.get('filename', '')
              if fn.startswith('app/'):
                  cls.set('filename', fn[4:])
          tree.write('backend/coverage.xml', xml_declaration=True, encoding='UTF-8')
          "
          echo "--- Backend coverage.xml (after fix) ---"
          cat backend/coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}